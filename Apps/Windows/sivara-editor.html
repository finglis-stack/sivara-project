<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sivara Editor</title>
  <link rel="stylesheet" href="sivara-editor.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;500&family=Lora:wght@400;500;600&family=Merriweather:wght@400;700&family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@400;600&family=Open+Sans:wght@400;600&family=Lato:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Title Bar -->
  <div id="titlebar">
    <div id="titlebar-left">
      <button id="btn-back" class="titlebar-nav-btn" title="Retour au navigateur">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
      <div class="titlebar-sep-v"></div>
      <div id="doc-icon-btn" class="doc-icon" style="background: #3B82F6;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <input type="text" id="doc-title" value="Sans titre" spellcheck="false">
    </div>
    <div id="titlebar-center">
      <div id="status-indicator">
        <span id="status-dot" class="dot dot-idle"></span>
        <span id="status-text">Prêt</span>
      </div>
    </div>
    <div id="titlebar-controls">
      <button id="btn-minimize" class="titlebar-btn" title="Minimiser">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button id="btn-maximize" class="titlebar-btn" title="Maximiser">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button id="btn-close" class="titlebar-btn titlebar-btn-close" title="Fermer">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Toolbar (matches DocEditor.tsx) -->
  <div id="toolbar">
    <div id="toolbar-inner">
      <!-- Font Family -->
      <select id="font-family" class="toolbar-select" title="Police">
        <option value="Inter, sans-serif">Inter (Sans)</option>
        <option value="Roboto, sans-serif">Roboto</option>
        <option value="'Open Sans', sans-serif">Open Sans</option>
        <option value="Lato, sans-serif">Lato</option>
        <option value="Montserrat, sans-serif">Montserrat</option>
        <option value="serif">Serif</option>
        <option value="'Playfair Display', serif">Playfair Display</option>
        <option value="Merriweather, serif">Merriweather</option>
        <option value="Lora, serif">Lora</option>
        <option value="'Courier Prime', monospace">Courier Prime</option>
      </select>
      <div class="toolbar-sep"></div>
      <!-- Font Size -->
      <select id="font-size" class="toolbar-select toolbar-select-sm" title="Taille">
        <option value="">16</option>
        <option value="12">12</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="20">20</option>
        <option value="24">24</option>
        <option value="30">30</option>
        <option value="36">36</option>
        <option value="48">48</option>
        <option value="60">60</option>
        <option value="72">72</option>
      </select>
      <div class="toolbar-sep"></div>
      <!-- Formatting -->
      <button class="tool-btn" data-cmd="bold" title="Gras (Ctrl+B)"><b>B</b></button>
      <button class="tool-btn" data-cmd="italic" title="Italique (Ctrl+I)"><i>I</i></button>
      <button class="tool-btn" data-cmd="underline" title="Souligné (Ctrl+U)"><u>U</u></button>
      <div class="toolbar-sep"></div>
      <!-- Alignment -->
      <button class="tool-btn" data-cmd="alignLeft" title="Aligner à gauche">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 2h12M1 5h8M1 8h12M1 11h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-cmd="alignCenter" title="Centrer">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 2h12M3 5h8M1 8h12M3 11h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-cmd="alignRight" title="Aligner à droite">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 2h12M5 5h8M1 8h12M5 11h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <div class="toolbar-sep"></div>
      <!-- Lists -->
      <button class="tool-btn" data-cmd="bulletList" title="Liste à puces">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="2" cy="3" r="1.2" fill="currentColor"/><circle cx="2" cy="7" r="1.2" fill="currentColor"/><circle cx="2" cy="11" r="1.2" fill="currentColor"/><path d="M5 3h7M5 7h7M5 11h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-cmd="orderedList" title="Liste numérotée">
        <svg width="14" height="14" viewBox="0 0 14 14"><text x="1" y="4.5" fill="currentColor" font-size="5" font-weight="600">1</text><text x="1" y="8.5" fill="currentColor" font-size="5" font-weight="600">2</text><text x="1" y="12.5" fill="currentColor" font-size="5" font-weight="600">3</text><path d="M5 3h7M5 7h7M5 11h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <div class="toolbar-sep"></div>
      <!-- Image -->
      <button class="tool-btn" data-cmd="image" title="Insérer une image">
        <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="4.5" cy="5" r="1.2" stroke="currentColor" stroke-width="1" fill="none"/><path d="M1 10l3-3 2 2 3-3 4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
    </div>
    <div id="toolbar-right">
      <button id="btn-save" class="tool-btn tool-btn-accent" title="Enregistrer (Ctrl+S)">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M11 13H3a1 1 0 01-1-1V2a1 1 0 011-1h6l3 3v8a1 1 0 01-1 1z" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M4 8h6M4 10h4" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
        <span>Enregistrer</span>
      </button>
    </div>
  </div>

  <!-- Internet Required Overlay -->
  <div id="internet-required" class="overlay" style="display: none;">
    <div class="overlay-card">
      <div class="overlay-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="#ef4444" stroke-width="1.5" fill="none"/><path d="M12 8v4M12 16h.01" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <h2>Connexion internet requise</h2>
      <p>Ce document contient des protections de sécurité qui nécessitent une connexion internet :</p>
      <ul id="security-flags-list"></ul>
      <p class="overlay-hint">Connectez-vous à internet et réessayez.</p>
      <button id="btn-retry-online" class="overlay-btn">Réessayer</button>
    </div>
  </div>

  <!-- Editor Area (same layout as DocEditor.tsx) -->
  <div id="editor-scroll" class="editor-scroll">
    <div id="editor-page" class="editor-page">
      <div id="editor"></div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <div id="statusbar-left">
      <span id="connectivity-badge" class="badge badge-online">
        <span class="badge-dot"></span> En ligne
      </span>
      <span id="file-path-display">—</span>
    </div>
    <div id="statusbar-right">
      <span id="char-count">0 caractères</span>
      <span id="last-saved">—</span>
    </div>
  </div>

  <!-- TipTap Bundle (built from src/tiptap-entry.js) -->
  <script src="dist/tiptap-bundle.js"></script>
  <!-- Crypto libs -->
  <script src="lib/encryption-native.js"></script>
  <script src="lib/sivara-vm-native.js"></script>
  <!-- Editor logic -->
  <script src="sivara-editor.js"></script>
</body>
</html>
